<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garbage Collection Tracker</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-gradient sticky-top" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-trash2"></i> Garbage Collection Tracker
            </span>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="row">
            <!-- Sidebar Navigation -->
            <div class="col-md-3 mb-4">
                <div class="list-group sticky-top" style="top: 100px;">
                    <button class="list-group-item list-group-item-action active" onclick="switchSection('today', event)">
                        <i class="bi bi-calendar-check"></i> Today's Pickups
                    </button>
                    <button class="list-group-item list-group-item-action" onclick="switchSection('add', event)">
                        <i class="bi bi-plus-circle"></i> Add Schedule
                    </button>
                    <button class="list-group-item list-group-item-action" onclick="switchSection('schedules', event)">
                        <i class="bi bi-calendar2-event"></i> All Schedules
                    </button>
                    <button class="list-group-item list-group-item-action" onclick="switchSection('analytics', event)">
                        <i class="bi bi-bar-chart"></i> Analytics Dashboard
                    </button>
                    <button class="list-group-item list-group-item-action" onclick="switchSection('settings', event)">
                        <i class="bi bi-gear"></i> Settings
                    </button>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9">
                <!-- Today's Pickups Section -->
                <section id="today" class="section-content active">
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-gradient" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <h5 class="mb-0 text-white">
                                <i class="bi bi-calendar-check"></i> Today's Pickups
                            </h5>
                        </div>
                        <div class="card-body">
                            <div id="pickupsContainer" class="row g-3">
                                <!-- Pickups will be rendered here -->
                            </div>
                            <div id="emptyState" class="alert alert-info text-center mb-0" role="alert">
                                <i class="bi bi-info-circle"></i> No pickups scheduled for today
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Add Schedule Section -->
                <section id="add" class="section-content">
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-gradient" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <h5 class="mb-0 text-white">
                                <i class="bi bi-plus-circle"></i> Add New Schedule
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="scheduleForm">
                                <div class="mb-3">
                                    <label for="area" class="form-label fw-bold">Area Name</label>
                                    <input type="text" class="form-control form-control-lg" id="area" placeholder="e.g., Sector A" required>
                                </div>

                                <div class="mb-3">
                                    <label for="address" class="form-label fw-bold">Address</label>
                                    <input type="text" class="form-control form-control-lg" id="address" placeholder="e.g., Main Street" required>
                                </div>

                                <div class="mb-3">
                                    <label for="time" class="form-label fw-bold">Pickup Time</label>
                                    <input type="time" class="form-control form-control-lg" id="time" required>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-bold">Select Days:</label>
                                    <div class="row g-2">
                                        <div class="col-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" value="Monday" id="mon">
                                                <label class="form-check-label" for="mon">Monday</label>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" value="Tuesday" id="tue">
                                                <label class="form-check-label" for="tue">Tuesday</label>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" value="Wednesday" id="wed">
                                                <label class="form-check-label" for="wed">Wednesday</label>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" value="Thursday" id="thu">
                                                <label class="form-check-label" for="thu">Thursday</label>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" value="Friday" id="fri">
                                                <label class="form-check-label" for="fri">Friday</label>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" value="Saturday" id="sat">
                                                <label class="form-check-label" for="sat">Saturday</label>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" value="Sunday" id="sun">
                                                <label class="form-check-label" for="sun">Sunday</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <button type="button" class="btn btn-gradient btn-lg w-100" onclick="addSchedule()">
                                    <i class="bi bi-check-circle"></i> Add Schedule
                                </button>
                            </form>
                        </div>
                    </div>
                </section>

                <!-- All Schedules Section -->
                <section id="schedules" class="section-content">
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-gradient" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <h5 class="mb-0 text-white">
                                <i class="bi bi-calendar2-event"></i> All Schedules
                            </h5>
                        </div>
                        <div class="card-body">
                            <div id="allSchedulesContainer" class="row g-3">
                                <!-- Schedules will be rendered here -->
                            </div>
                            <div id="emptySchedules" class="alert alert-info text-center mb-0" role="alert">
                                <i class="bi bi-info-circle"></i> No schedules added yet
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Analytics Section -->
                <section id="analytics" class="section-content">
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-gradient" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <h5 class="mb-0 text-white">
                                <i class="bi bi-bar-chart"></i> Analytics Dashboard
                            </h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <div class="p-3 border rounded bg-white h-100">
                                        <h6 class="text-muted mb-3 text-center">Collection Status</h6>
                                        <div style="max-height: 300px; position: relative;">
                                            <canvas id="statusChart"></canvas>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="p-3 border rounded bg-white h-100">
                                        <h6 class="text-muted mb-3 text-center">Weekly Collection Trend</h6>
                                        <div style="max-height: 300px; position: relative;">
                                            <canvas id="trendChart"></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Settings Section -->
                <section id="settings" class="section-content">
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-gradient" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <h5 class="mb-0 text-white">
                                <i class="bi bi-gear"></i> Settings
                            </h5>
                        </div>
                        <div class="card-body">
                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" id="soundToggle" checked>
                                <label class="form-check-label" for="soundToggle">
                                    <i class="bi bi-volume-up"></i> Enable Sound Alerts
                                </label>
                            </div>
                            <div class="form-check form-switch mb-4">
                                <input class="form-check-input" type="checkbox" id="notificationToggle" checked>
                                <label class="form-check-label" for="notificationToggle">
                                    <i class="bi bi-bell"></i> Enable Browser Notifications
                                </label>
                            </div>
                            <div class="d-grid">
                                <button type="button" class="btn btn-outline-primary" onclick="playSound('urgent')">
                                    <i class="bi bi-volume-up"></i> Test Alert Sound
                                </button>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <!-- Audio element for alerts -->
    <audio id="alertSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA==" type="audio/wav">
    </audio>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
